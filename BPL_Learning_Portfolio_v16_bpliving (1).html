<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#111;}
button{font-family:inherit;border:0.5px solid #ccc;background:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#111;}
button:hover{background:#f0f0f0;}
input,textarea,select{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#111;width:100%;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2BB373;}
.grid-wrap{overflow-x:auto;border-radius:8px;border:0.5px solid #e0e0e0;}
table{border-collapse:collapse;}
td{vertical-align:top;padding:7px 9px;border:0.5px solid #e0e0e0;font-size:11px;line-height:1.45;}
.lbl{width:72px;min-width:72px;font-size:10px;font-weight:500;text-align:right;background:#fafafa;color:#888;position:sticky;left:0;z-index:2;}
.indc{width:128px;min-width:128px;font-weight:500;font-size:10px;text-align:center;padding:7px 6px;}
.capc{font-weight:500;font-size:10px;text-align:center;padding:5px;letter-spacing:0.03em;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>

const REPORTS={
  stella:{glows:"Stella's care for animals and the environment is remarkable and completely authentic. Her drawing of shelter dogs showed nuanced empathy -- she used color deliberately to distinguish sad dogs from happy ones and explained each dog by name. The fish tank responsibility reveals a student who takes commitments seriously and helps others understand them. She connected peers naturally and patiently when a new student needed guidance.\\n\\nStellas question during the ocean trash circle time -- she was the first hand up, and she connected the image to her own experience at the beach -- shows a student already making links between the world she observes and the feelings that observation generates. That is the beginning of genuine inquiry.",grows:"Stella is finding her voice in larger group settings. Earlier in the year she shared primarily in small groups. Her unprompted contribution during whole-class circle time, where she named what the fish must be feeling and asked what we could do, marks a real step in Presents ideas at Level 1. She is beginning to understand that her observations are worth sharing beyond her immediate circle.\\n\\nHer block center animal shelter project showed growth in planning and explaining. She spent extended focused time on the design and explained her choices to a friend in a way that showed she had a clear vision in her head that she wanted to communicate.",goals:"The most natural next step for Stella is connecting her caring instincts to a simple concrete action. She already asks why and what can we do -- the goal is taking a first step. A class project around shelter animals, or a drawing series she shares with the community, would build on exactly what she already loves.\\n\\nIn the coming cycle, supporting her in asking more observational questions will help her grow as an inquirer. When she says the fish feel scared, following that with what makes you think that and what would you do to find out more gently introduces ER habits in language she already uses."},
  tyber:{glows:"Tyber's LEGO bridge challenge showed genuine engineering thinking -- he did not just build, he tested, analyzed failure, and rebuilt with a hypothesis about what would work better. That cycle of try, observe, revise is exactly the pattern we want to encourage, and it came entirely from him.\\n\\nHis comic book, The Brick Knight, is a genuine creative achievement for a second grader. The story had structure, the hero had a clear motivation, and he read it to the class with confidence. He answered questions about his design choices thoughtfully, showing that the decisions were intentional, not accidental.",grows:"Tyber's growth this semester is most visible in his willingness to share. At the start of the year he was reluctant to present work in front of the group. Reading his comic book aloud and fielding questions was a significant step. He made eye contact, answered questions, and seemed genuinely pleased by his classmates' responses.\\n\\nHis soccer season evidence shows growth in social awareness that does not always show up in his individual work. Comforting a teammate after a loss is evidence of someone beginning to notice and respond to others' emotional states -- a real development in Understands others.",goals:"The focus for the coming cycle is helping Tyber share his internal process with others. He has rich ideas that he works out privately -- in his LEGO city, in his comic book -- and the next step is bringing others into that process earlier rather than only showing finished work.\\n\\nConnecting his building work to the math we do in class is a natural next step for QR. He already uses measurement and comparison; making that thinking explicit and documented will strengthen both his mathematical fluency and his ability to explain his reasoning to others."},
  megan:{glows:"Megan's harp performance at the spring concert was a standout moment. She performed from memory, introduced the piece with genuine warmth, and maintained presence with the audience throughout. Presents ideas at Level 3 is accurate -- she is communicating with intention, not just technically executing.\\n\\nHer animal shelter awareness poster demonstrates real persuasive thinking. She chose her statistics, her images, and her language deliberately to move an audience toward action. That it generated comments from students and parents in the hallway is evidence that it worked.",grows:"Megan's most significant growth this cycle is visible in the Socratic seminar. She changed her position in response to a classmate's argument -- a move that requires real intellectual humility and genuine listening. That is growth in Constructs understanding that is worth naming explicitly with her.\\n\\nHer self-portrait project showed growth in self-reflection. Earlier work tended to stay on the surface; this project showed her making connections between who she is, what she loves, and what she wants to contribute. That kind of layered self-knowledge is the foundation for meaningful goal-setting.",goals:"The most important focus for Megan in the coming cycle is developing investigative habits to match her advocacy instincts. She cares deeply and acts from that care; the next step is learning to back her advocacy with evidence she has gathered herself. An animal observation journal, or a simple survey of her school community, would be a natural starting point.\\n\\nConnecting her art and music to quantitative thinking -- how many animals are in shelters in our area, what are the trends -- would strengthen her work and open new ways of making the case she already wants to make."},
  sakura:{glows:"Sakura's softball evidence tells a story of remarkable emotional leadership. Organizing encouraging words for each teammate after a loss, at nine years old, is not a small thing. The Understands others and Builds connections indicators are both in evidence here in a meaningful way.\\n\\nHer ocean watercolor series shows the combination of careful research and genuine artistic investment that makes her work distinctive. She did not just paint pretty pictures -- she researched each zone, included scientific names, and produced work that is now on display in the library. That integration of inquiry and expression is exactly what we want to build on.",grows:"Sakura's beach cleanup evidence marks an important transition -- from observer to actor. She did not just participate, she organized her family, counted and categorized the findings, and brought her data back to the classroom. That is growth in Community needs and Sustainable development that came entirely from her own initiative.\\n\\nThe question she asked -- why were plastic bags the most common item -- is the beginning of genuine investigative thinking. She has not yet designed an investigation, but she is asking the kind of question that investigations start from. That is growth worth building on.",goals:"The most natural next step for Sakura is presenting what she knows. She has done substantial research on sea turtles and has produced beautiful work about the ocean -- the opportunity is sharing it with an audience and adapting her communication for different listeners.\\n\\nDesigning a simple investigation connected to her plastic bag question would develop her ER skills in a way that connects directly to something she already cares about. The question is there; the next step is helping her figure out how to answer it."},
  bodhi:{glows:"Bodhi's Scratch game is genuinely impressive for a fifth grader. Variables, conditional logic, collision detection, a scoring system, a timer, and a win condition -- these are not beginner concepts. That he also tested it with classmates and revised based on their feedback shows a student who understands that making things for others requires understanding what others need.\\n\\nHis cross country data practice is sophisticated and entirely self-directed. He tracks his times, identifies variables, and adjusts his approach. That is exactly the Uses math strategies indicator at Level 3, and it is happening in service of something he deeply cares about.",grows:"The tutorial video marks meaningful growth in Communication. Bodhi is naturally private about his work; choosing to film and share a tutorial that anticipates other people's questions is a significant step toward thinking about audience rather than just executing for himself.\\n\\nHis Math Olympiad performance showed growth in explaining his thinking to others. He solved two hard problems and then explained his approach to teammates -- not because he was asked to, but because he understood that sharing his reasoning was valuable. That is growth in Communicates learning.",goals:"The most important focus for Bodhi in the coming cycle is broadening his audience and his awareness of social context. His work is exceptional but largely self-referential -- he builds games and sets running goals for himself. The opportunity is beginning to think about how his skills and interests can contribute to something larger.\\n\\nDeveloping his SR indicators is the natural target. He has not yet connected his interests to community issues or social questions. A project that uses his programming skills in service of a real community need -- an app that helps shelter animals find homes, for example -- would be a powerful bridge."},
  maggie:{glows:"Maggie's waste audit is the strongest student-led investigation I have seen at this grade level. She designed the protocol, trained the team, analyzed the results, and translated her findings into a persuasive presentation to the principal. The ER indicators across the board are at Level 3, and the SR indicators are equally strong -- she understands how individual and group actions shape communities over time.\\n\\nHer lead climbing certification story is a masterclass in Personal Qualities development. She failed, identified specifically what went wrong, practiced those elements, and returned three weeks later to pass. That cycle -- failure, analysis, targeted practice, success -- is exactly what Builds resilience and Self-appraisal look like at Level 3.",grows:"Maggie's growth this cycle is most visible in her willingness to share her work publicly. Earlier in the year she did her best work in relative privacy. Presenting to the principal, filing a proposal, and speaking at an advisory session represent a student who is beginning to understand that her work is meant to be seen and acted on.\\n\\nHer outdoor education journal shows growth in self-reflection that is distinct from her advocacy work. She is beginning to reflect on group dynamics and her own role in them -- a kind of social self-awareness that complements her environmental focus.",goals:"The most important focus for Maggie in the coming cycle is strengthening the quantitative foundation of her advocacy. Her arguments are compelling but rely heavily on percentages from her own audit. Learning to find, interpret, and cite external data -- city reports, peer-reviewed research, policy documents -- will make her work significantly more credible and significantly harder to dismiss.\\n\\nA second focus: helping Maggie engage seriously with perspectives that complicate her positions. She is a strong advocate, which is a gift, and the next step is developing the intellectual discipline to steelman the other side before arguing against it."},
  owen:{glows:"Owen's documentary on the forgotten park is genuinely professional work. Identifying five interview subjects across different stakeholder groups, structuring the narrative arc, and editing it to a 12-minute film that generated real community discussion at a public meeting -- these are skills that many adults in communications fields have not developed. Communication indicators across the board are at Level 4.\\n\\nHis Eagle Scout project demonstrates something equally important: the ability to manage a complex, multi-month, multi-stakeholder initiative while still meeting his other commitments. Eighteen volunteers, a permit application, a budget, and a parks department relationship -- all managed by a 9th grader. That is KHTL at Level 4 across every indicator.",grows:"The most significant growth this cycle is Owen's increasing awareness of his own limitations as an investigator. His LP conversation showed genuine self-awareness: he acknowledged that his films start with a position and work backward rather than starting with inquiry. That kind of honesty is the prerequisite for growth, and it shows up in his documentary work -- the forgotten park film is more genuinely investigative than his earlier work.\\n\\nHis ski instructor work shows growth in perspective-taking that is distinct from his filmmaking. Adapting his teaching for eight different six-year-olds, and identifying one who needed a completely different approach, shows a student developing real empathy and flexibility.",goals:"The most important focus for Owen in the coming cycle is developing investigative rigor to match his communicative skill. He can argue powerfully; the next step is building arguments that start from genuine inquiry rather than a predetermined conclusion. For his next documentary, the assignment should be: find the most compelling counterargument and film it first.\\n\\nExploring the film production internship is a natural priority. Owen is ready for professional mentorship, and the gap between what he is producing and what is professionally possible is narrowing rapidly. An internship would accelerate that development in ways that school alone cannot."}

    3: '3 Students at this step use communication tools with awareness of context and audience. They select modes and organizational structures that fit their purpose, use familiar digital technologies to create and share their work, and use precise vocabulary within their areas of interest. They participate actively in discussions, ask clarifying and probing questions, and build on the ideas of others.',
    2: '2 Students at this step use a variety of communication tools to organize and share their ideas and feelings. They recognize that different situations call for different ways of communicating, and they choose words and add detail to make their meaning clearer. They ask questions, share observations, and build on the ideas of their classmates in group discussions.',
    1: '1 Students at this step explore oral, graphic, and creative ways to express their thoughts and needs. They use play, pretend, and conversation to make sense of the world and connect with others. They are developing confidence to share their ideas in familiar settings and are beginning to understand that communication can take many different forms.',
  },
  pq: {
    4: '4 Students at this step adjust their goals and strategies based on reflection and feedback and recognize their own growth over time. They make intentional choices despite strong emotions or outside pressure and maintain routines that support their physical, emotional, and social health. They take perspective in disagreement, advocate for themselves and others, and maintain caring relationships while recognizing harmful dynamics. They adjust their participation in community efforts based on feedback and consider the long-term impact of their actions.',
    3: '3 Students at this step reflect on their progress and set goals based on what they are learning about themselves. They practice strategies to manage stress and emotions and make intentional choices to support their wellbeing. They are aware of how their actions affect others and communicate in ways that influence outcomes. They participate in sustained efforts around issues they care about and reflect on their role.',
    2: '2 Students at this step are aware of their personal strengths and set goals based on them. They use strategies to manage their emotions and follow through on commitments. They recognize that people experience situations differently and that their actions influence group dynamics. They communicate clearly in relationships and take action on community needs.',
    1: '1 Students at this step recognize their own strengths, preferences, and basic needs, and understand that how they feel affects how they act. They name what they observe in others and initiate positive connections with peers. They recognize that their actions have consequences and identify community issues they care about.',
  },
  qr: {
    4: '4 Students at this step reach for mathematical thinking across a range of situations, including those not obviously connected to mathematics. They analyze complex situations to identify assumptions, sources of uncertainty, and what can be known precisely versus approximately. They design and refine mathematical approaches, drawing on strategies involving proportional relationships, unknowns, and structural patterns, and they adjust their approaches based on what the situation actually requires. They examine quantitative arguments to identify misuse, bias, or limitations, and they use mathematical reasoning to construct and defend their own claims.',
    3: '3 Students at this step actively look for mathematical entry points in their own projects and interests, including in less familiar situations. They clarify problems by identifying what is relevant, what is uncertain, and whether precision or approximation is more appropriate. They shift between mathematical forms, including diagrams, graphs, tables, and symbolic expressions, to communicate and develop their thinking. They adapt strategies based on the demands of the situation, and they compare approaches to identify which is more accurate or efficient.',
    2: '2 Students at this step reach for mathematical thinking in familiar situations and everyday tasks. They use estimation to get a sense of scale before engaging with a problem and check whether their answers make sense. They apply counting, measurement, and basic operations to describe and compare situations, and they begin to notice patterns and use data to support simple claims.',
    1: '1 Students at this step are beginning to see mathematical ideas in their everyday world. They notice patterns, quantities, shapes, and change around them and are curious about what they find. They explore mathematical ideas through play, hands-on investigation, and everyday experience, using objects, movement, and visual models to make sense of what they observe.',
  },
  er: {
    4: '4 Students at this step treat their questions, methods, and conclusions as things to be refined, not just completed. They revise in response to evidence, evaluate whether sources and findings can be trusted, and hold their conclusions open to change.',
    3: '3 Students at this step design and carry out investigations connected to their own interests. They form testable hypotheses, think carefully about variables, and draw conclusions that are honest about what the evidence does and does not show.',
    2: '2 Students at this step ask questions they genuinely want to answer and plan simple ways to investigate them. They connect what they find to evidence and are beginning to think about what changes and what stays the same.',
    1: '1 Students at this step notice and explore the world around them, driven by curiosity. They try things out, describe what they observe, and make simple predictions based on direct experience.',
  },
  sr: {
    4: '4 Students at this step apply fairness and equity when deciding how to act on issues they care about. They analyze how power shapes decisions and who gets to influence them, engage seriously with perspectives different from their own, and adjust their participation when they encounter exclusion or injustice.',
    3: '3 Students at this step draw on past and present examples when thinking about social issues and propose solutions that reflect an understanding of how actions affect communities over time. They recognize that decisions made by individuals and groups can have far-reaching impact, and they approach cultural difference as a source of understanding rather than a problem to manage.',
    2: '2 Students at this step understand how they are connected to the people and places around them. They recognize that communities have leaders, roles, and shared resources, and that members may hold different opinions and beliefs. They identify unfair access in their immediate context and begin to consider why it exists and what might be done about it.',
    1: '1 Students at this step recognize themselves as belonging to groups. They can name the norms and traditions within those groups. They notice when situations feel unfair and demonstrate care for shared spaces, resources, and the people around them.',
  },
  khtl: {
    4: '4 Students at this step engage in and contribute to multi-step individual and group projects with strategic self-direction. They set clear goals, create structured learning plans, and adjust priorities and approaches in response to feedback, new understanding, and real-life responsibilities. They seek out and compare sources and perspectives, develop and revise ideas or products based on what they are learning, and explain how experiences and challenges shaped their thinking.',
    3: '3 Students at this step investigate interests with increasing focus and intentionality. They create structured plans, seek clarification from knowledgeable sources, and develop ideas or products that they refine based on their own assessment of what is working. They contribute actively to group learning, recognize their role in collaborative work, and reflect on what they learned and how.',
    2: '2 Students at this step ask questions connected to their interests and identify realistic ways to investigate them. They use simple strategies and organizational tools to pursue goals, follow through on their designated role in group work, and begin to adjust their plans based on input from others.',
    1: '1 Students at this step explore their curiosities by asking questions and trying things out. They use the people and resources around them to find things out, retell what they learned, and participate in group activities. They are developing the habits of noticing, wondering, and seeking help when they need it.',
  },
};

function avgRatings(sid,ev){
  const ap=ev.filter(e=>e.studentId===sid&&e.status==='approved'),su={},co={};
  ap.forEach(e=>{Object.entries(e.ratings||{}).forEach(([s,inds])=>{if(!su[s]){su[s]={};co[s]={};}Object.entries(inds).forEach(([i,l])=>{if(l>0){su[s][i]=(su[s][i]||0)+l;co[s][i]=(co[s][i]||0)+1;}});});});
  const r={};Object.entries(su).forEach(([s,inds])=>{r[s]={};Object.entries(inds).forEach(([i,v])=>{r[s][i]=v/co[s][i];});});
  return r;
}

function ratToCell(rat){
  const c={};Object.entries(rat||{}).forEach(([s,inds])=>{IND[s]&&Object.entries(inds).forEach(([i,l])=>{const ci=IND[s].indexOf(i);if(ci>=0&&l>0)c[s+'-'+ci]=l;});});
  return c;
}

function leafPos(n){
  const cc=n<=8?4:5,rc=Math.ceil(n/cc),p=[];
  for(let i=0;i<n;i++){const row=Math.floor(i/cc),col=i%cc,ir=row<rc-1?cc:n-(rc-1)*cc;p.push({dx:(col-(ir-1)/2)*24,dy:(row-(rc-1)/2)*22,a:(col-(ir-1)/2)*24*0.45});}
  return p;
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(err){return{hasError:true,error:err};}
  componentDidCatch(err,info){console.error('BPL App error:',err,info);}
  render(){
    if(this.state.hasError){
      return RC('div',{style:{padding:'24px',background:'#fff5f5',border:'1px solid #fca5a5',borderRadius:'8px',margin:'16px',fontFamily:'system-ui'}},
        RC('div',{style:{fontWeight:600,color:'#dc2626',marginBottom:'8px',fontSize:'14px'}},'Something went wrong. Please share this message with Carrie:'),
        RC('div',{style:{fontSize:'12px',color:'#333',background:'#fff',padding:'12px',borderRadius:'6px',whiteSpace:'pre-wrap',overflowX:'auto',maxHeight:'300px',overflow:'auto'}},
          this.state.error?(this.state.error.message+String.fromCharCode(10)+String.fromCharCode(10)+this.state.error.stack):'Unknown error'
        ),
        RC('button',{onClick:function(){window.location.reload();},style:{marginTop:'12px'}},'Reload page')
      );
    }
    return this.props.children;
  }
}

        var hasEvidence=allVals.length>0;

function HeatMapModal({sid,studentId,evidence,lpGoals,onClose,onJumpToEvidence}){
  const s=SC[sid],inds=IND[sid],caps=CAPS[sid],cells=CELLS[sid];
  const [activeKey,setActiveKey]=useState(null);
  const [lockedKey,setLockedKey]=useState(null);
  const [showProgression,setShowProgression]=useState(false);
  var goalInds=(lpGoals&&lpGoals.scaffoldGoals&&lpGoals.scaffoldGoals[sid])
    ?(lpGoals.scaffoldGoals[sid].indicators||[]):[];

  // Calculate average level across all indicators for this scaffold
  const allScores=[];
  evidence.filter(e=>e.studentId===studentId&&e.status==='approved').forEach(ev=>{
    const ratings=ev.ratings[sid]||{};
    inds.forEach(ind=>{const v=ratings[ind]||0;if(v>0)allScores.push(v);});
  });
  const avgLevel=allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):0;

  // Build freq map: freq[ci][level] = [{title,date},...]
  const freq={};
  evidence.filter(e=>e.studentId===studentId&&e.status==='approved').forEach(ev=>{
    const ratings=ev.ratings[sid]||{};
    inds.forEach((ind,ci)=>{
      const level=ratings[ind]||0;
      if(level>0){
        if(!freq[ci])freq[ci]={};
        if(!freq[ci][level])freq[ci][level]=[];
        freq[ci][level].push({title:ev.title,date:ev.date,id:ev.id});
      }
    });
  });

  function getShade(count){
    if(count===0)return{bg:'#fff',text:'#ccc',border:'#e0e0e0',countBorder:s.h2};
    if(count===1)return{bg:s.h1,text:s.h8,border:s.h2,countBorder:s.h6};
    if(count===2)return{bg:s.h2,text:s.h8,border:s.h6,countBorder:s.h8};
    return{bg:s.h6,text:'white',border:s.h8,countBorder:'rgba(255,255,255,0.5)'};
  }

  const displayKey=lockedKey||activeKey;
  const activeItems=displayKey?(freq[parseInt(displayKey.split('-')[0])]?.[parseInt(displayKey.split('-')[1])]||[]):[];
  const rows=[4,3,2,1];

  return RC('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'},
    onClick:onClose
  },
    RC('div',{
      style:{background:'white',borderRadius:'12px',width:'100%',maxWidth:'1100px',maxHeight:'92vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'},
      onClick:e=>e.stopPropagation()
    },
      RC('div',{style:{background:s.h6,padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
        RC('div',null,
          RC('div',{style:{color:'white',fontSize:'15px',fontWeight:500}},s.name+' — Evidence Heat Map'),
          RC('div',{style:{color:'rgba(255,255,255,0.75)',fontSize:'11px',marginTop:'2px'}},'Darker cells have more evidence pointing there — hover or tap to see which pieces contributed')
        ),
        RC('button',{onClick:onClose,style:{background:'rgba(255,255,255,0.2)',border:'none',color:'white',borderRadius:'6px',padding:'4px 12px',cursor:'pointer',fontSize:'12px',display:'flex',alignItems:'center',gap:'5px'}},
          RC('i',{className:'ti ti-x',style:{fontSize:'13px'}}),'Close'
        )
      ),
      RC('div',{style:{padding:'8px 16px',background:s.h5,borderBottom:'0.5px solid '+s.h1,display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap',flexShrink:0}},
        RC('span',{style:{fontSize:'11px',fontWeight:500,color:s.h8}},'Frequency:'),
        [[s.h1,s.h8,'1 evidence piece'],[s.h2,s.h8,'2 pieces'],[s.h6,'white','3 or more'],['#efefef','#555','LP goal']].map(([bg,text,label],i)=>
          RC('div',{key:i,style:{display:'flex',alignItems:'center',gap:'5px'}},
            RC('div',{style:{width:'22px',height:'14px',borderRadius:'3px',background:bg,border:'0.5px solid '+s.h2}}),
            RC('span',{style:{fontSize:'11px',color:s.h8}},label)
          )
        ),
        RC('div',{style:{flex:1}}),
        avgLevel>0&&RC('button',{
          onClick:()=>setShowProgression(p=>!p),
          style:{
            fontSize:'11px',fontWeight:500,
            background:showProgression?s.h6:'white',
            border:'0.5px solid '+(showProgression?s.h8:s.h2),
            color:showProgression?'white':s.h8,
            borderRadius:'6px',padding:'4px 10px',
            display:'flex',alignItems:'center',gap:'5px',
            transition:'all 0.15s',flexShrink:0
          }
        },
          RC('i',{className:'ti ti-chart-bar',style:{fontSize:'12px'}}),
          showProgression?'Hide Progression Level':'Show Progression Level'
        ),
        RC('span',{style:{fontSize:'11px',color:s.h8,fontStyle:'italic',display:'flex',alignItems:'center',gap:'4px'}},
          RC('i',{className:'ti ti-hand-finger',style:{fontSize:'12px'}}),
          'Tap or hover a cell to see which evidence contributed'
        )
      ),
      RC('div',{style:{
        padding:'8px 16px',minHeight:'36px',
        background:displayKey&&activeItems.length>0?s.h5:'#fafafa',
        borderBottom:'0.5px solid #e0e0e0',
        display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',
        flexShrink:0,transition:'background 0.15s'
      }},
        displayKey&&activeItems.length>0
          ?RC('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}},
              RC('i',{className:'ti ti-file-text',style:{fontSize:'13px',color:s.h6,flexShrink:0}}),
              RC('span',{style:{fontSize:'11px',fontWeight:500,color:s.h8,marginRight:'4px'}},'Evidence:'),
              lockedKey&&RC('span',{style:{fontSize:'10px',background:s.h6,color:'white',borderRadius:'4px',padding:'1px 6px',marginRight:'4px'}},'locked -- click cell to unlock'),
              ...activeItems.map((item,i)=>RC('span',{
                key:i,
                onClick:()=>{if(onJumpToEvidence&&item.id){onJumpToEvidence(item.id);onClose();}},
                style:{
                  fontSize:'12px',color:s.h8,background:'white',
                  border:'0.5px solid '+s.h1,borderRadius:'5px',padding:'2px 8px',
                  cursor:onJumpToEvidence?'pointer':'default',
                  display:'flex',alignItems:'center',gap:'5px',
                  transition:'background 0.1s',
                },
                onMouseEnter:function(e){if(onJumpToEvidence)e.currentTarget.style.background=s.h5;},
                onMouseLeave:function(e){e.currentTarget.style.background='white';}
              },
                item.title+' ('+item.date+')',
                onJumpToEvidence&&RC('i',{className:'ti ti-arrow-right',style:{fontSize:'11px',opacity:0.6}})
              ))
            )
          :RC('span',{style:{fontSize:'11px',color:'#bbb',fontStyle:'italic'}},
              displayKey&&goalInds.includes(inds[parseInt(displayKey.split('-')[0])])?RC('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},RC('i',{className:'ti ti-target',style:{fontSize:'13px',color:'#888'}}),RC('span',{style:{fontSize:'12px',color:'#555',fontStyle:'italic'}},'LP goal for this cycle: '+inds[parseInt(displayKey.split('-')[0])]+' -- no evidence scored here yet')):displayKey?'No evidence scored here yet':'Hover a cell to preview -- click to lock it'
            )
      ),
      RC('div',{style:{overflowX:'auto',overflowY:'auto',flex:1,padding:'12px 16px'}},
        RC('table',{style:{borderCollapse:'collapse',minWidth:(inds.length*128+72)+'px'}},
          RC('tbody',null,
            rows.map(level=>RC('tr',{key:level},
              RC('td',{className:'lbl',style:{fontSize:'12px',fontWeight:500,color:s.h6,borderTop:'0.5px solid #e0e0e0',paddingTop:'7px'}},level+''),
              inds.map((ind,ci)=>{
                const items=(freq[ci]&&freq[ci][level])||[];
                const count=items.length;
                const sh=getShade(count);
                const key=ci+'-'+level;
                const isActive=lockedKey===key;
                const isHovered=!lockedKey&&activeKey===key;
                const txt=(cells[level]||[])[ci]||'';
                return RC('td',{
                  key:ci,
                  onMouseEnter:()=>{if(count>0||goalInds.includes(ind))setActiveKey(key);},
                  onClick:()=>{if(count>0||goalInds.includes(ind))setLockedKey(k=>k===key?null:key);},
                  style:{
                    cursor:count>0?'pointer':'default',
                    background:count>0?sh.bg:goalInds.includes(ind)?'#efefef':'#fff',color:count>0?sh.text:goalInds.includes(ind)?'#666':'#ccc',
                    border:'0.5px solid '+(isActive?s.h8:isHovered?s.h6:sh.border),
                    outline:isActive?'2.5px solid '+s.h8:isHovered?'1.5px solid '+s.h6:goalInds.includes(ind)&&count===0?'1.5px dashed #bbb':'none',
                    fontSize:'11px',lineHeight:'1.45',padding:'7px 9px',
                    verticalAlign:'top',transition:'all 0.1s',
                    position:'relative',minWidth:'128px',width:'128px',
                  }
                },
                  count>0&&RC('div',{style:{
                    position:'absolute',top:'4px',right:'4px',
                    background:count>=3?'rgba(255,255,255,0.25)':sh.border,
                    borderRadius:'50%',width:'16px',height:'16px',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:'9px',fontWeight:700,
                    color:count>=3?'white':s.h8,
                  }},count),
                  txt
                );
              })
            ,
              showProgression&&PROGRESSION[sid]&&PROGRESSION[sid][level]&&RC('td',{
                rowSpan:1,
                style:{
                  width:'300px',minWidth:'300px',maxWidth:'300px',
                  position:'sticky',right:0,zIndex:2,
                  verticalAlign:'top',padding:'8px 14px',
                  fontSize:'12px',lineHeight:'1.65',color:'#111',
                  background:avgLevel===level?s.h5:'#fafafa',
                  border:'0.5px solid '+(avgLevel===level?s.h6:'#e8e8e8'),
                  borderLeft:avgLevel===level?'3px solid '+s.h6:'0.5px solid #e8e8e8',
                  transition:'all 0.2s',

function EvForm({studentName,init,isEdit,onSave,onCancel}){
  const [step,setStep]=useState(isEdit?2:1);
  const [form,setForm]=useState(init);
  const [listening,setListening]=useState(null);

  // Speech recognition setup
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const hasMic=!!SpeechRecognition;

  function startListen(field){
    if(!SpeechRecognition)return;
    const rec=new SpeechRecognition();
    rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;
    rec.onresult=function(e){
      const txt=e.results[0][0].transcript;
      setForm(function(f){return Object.assign({},f,{[field]:f[field]?(f[field]+' '+txt):txt});});
      setListening(null);
    };
    rec.onerror=function(){setListening(null);};
    rec.onend=function(){setListening(null);};
    rec.start();
    setListening(field);
  }

  function cSel(sid,ci,v,already){
    setForm(function(f){
      var key=sid+'-'+ci;
      var nc=Object.assign({},f.selectedCells);
      if(already){delete nc[key];}else{nc[key]=v;}
      var nr=Object.assign({},f.ratings);
      nr[sid]={};
      IND[sid].forEach(function(ind,i){
        var k=sid+'-'+i;
        if(nc[k]!==undefined)nr[sid][ind]=nc[k];
        else nr[sid][ind]=0;
      });

    }catch(e){}

  },[]);

  const adv=advisors.find(a=>a.id===aId);

  const stuEv=evidence.filter(e=>e.studentId===sId);
  const appr=stuEv.filter(e=>e.status==='approved');
  const pend=stuEv.filter(e=>e.status==='pending');
  const rat=sId?avgRatings(sId,evidence):{};
  const stuReports=sId?(savedReports[sId]||[]):[];

  function blank(){return{title:'',type:'link',content:'',note:'',followUpNotes:'',date:new Date().toISOString().split('T')[0],selectedScaffolds:[],openGrid:null,selectedCells:{},ratings:{}};}
  function evForm(ev){const sc=ratToCell(ev.ratings||{}),sel=Object.keys(ev.ratings||{}).filter(s=>SC[s]);return{title:ev.title,type:ev.type,content:ev.content,note:ev.note,followUpNotes:ev.followUpNotes||'',date:ev.date,selectedScaffolds:sel,openGrid:sel[0]||null,selectedCells:sc,ratings:ev.ratings||{}};}

  function saveEdit(f){setEvidence(p=>p.map(e=>e.id===eId?{...e,title:f.title,type:f.type,content:f.content,note:f.note,followUpNotes:f.followUpNotes||'',date:f.date,ratings:f.ratings}:e));setEId(null);setView('student');}
  function appEv(id){setEvidence(p=>p.map(e=>e.id===id?{...e,status:'approved'}:e));}
  function decEv(id){setEvidence(p=>p.filter(e=>e.id!==id));}

  function saveAdv(){if(!nAdv.name.trim())return;setAdvisors(p=>[...p,{id:'a'+Date.now(),name:nAdv.name.trim(),school:nAdv.school.trim()||'-',grade:nAdv.grade.trim()||'-'}]);setNAdv({name:'',school:'',grade:''});setAddAdv(false);}
  function saveStu(){if(!nStu.name.trim())return;const init=nStu.name.trim().split(' ').map(w=>w[0].toUpperCase()).join('').slice(0,2)||nStu.name.trim().slice(0,2).toUpperCase();setStudents(p=>[...p,{id:'s'+Date.now(),advisorId:aId,name:nStu.name.trim(),grade:nStu.grade,initials:init,colorIdx:advStu.length%SCOLS.length}]);setNStu({name:'',grade:'7th'});setAddStu(false);}
  function startEditAdv(adv,e){e.stopPropagation();setEditAdvId(adv.id);setEditAdvData({name:adv.name,school:adv.school,grade:adv.grade});}

  function cancelEditAdv(e){e.stopPropagation();setEditAdvId(null);}
  function saveStudentName(){if(stuNameDraft.trim())setStudents(p=>p.map(s=>s.id===sId?{...s,name:stuNameDraft.trim()}:s));setEditStuName(false);}

  async function generateReportAI(){
    setRGenerating(true);setRReady(false);
    var prewritten=REPORTS[sId];
    var evSummary=appr.map(function(ev){
      var scores=Object.entries(ev.ratings||{}).map(function(se){
        var sid2=se[0],inds=se[1];
        var lines=Object.entries(inds).filter(function(x){return x[1]>0;}).map(function(x){return x[0]+' (L'+x[1]+')';}).join(', ');
        return lines?SC[sid2].name+': '+lines:null;
      }).filter(Boolean).join('; ');
      return '- '+ev.title+' ('+ev.date+'): '+(ev.note||'No advisor note')+(scores?'. Scores: '+scores:'');
    }).join('\n')||'No evidence yet';
    var scaffoldSummary=Object.entries(rat).map(function(se){
      var sid2=se[0],inds=se[1];
      var lines=Object.entries(inds).filter(function(x){return x[1]>0;}).map(function(x){return x[0]+' avg '+x[1].toFixed(1);}).join(', ');
      return lines?SC[sid2].name+': '+lines:null;
    }).filter(Boolean).join('\n')||'No scaffold data yet';
    var lp=savedLPs[sId];
    var lpSummary='No Learning Plan on file';
    if(lp){var gl=Object.entries(lp.scaffoldGoals||{}).map(function(se){var sid2=se[0],g=se[1];return g.indicators&&g.indicators.length>0?SC[sid2].name+' goals: '+g.indicators.join(', '):null;}).filter(Boolean);if(gl.length)lpSummary='Cycle: '+lp.cycle+'\n'+gl.join('\n');if(lp.bpLivingGoal)lpSummary+='\nBP Living goals: '+lp.bpLivingGoal;}
    var prompt='You are an advisor at a Big Picture Learning school writing a progress report for '+stu.name+'. Big Picture Learning uses six learning scaffolds: Communication (expressing ideas to connect with and influence others), Personal Qualities (understanding of self and others), Quantitative Reasoning (using mathematics for life and work), Social Reasoning (contributing to society through understanding social issues), Empirical Reasoning (using observation and experimentation), and Knowing How to Learn (taking responsibility for learning). Indicators within each scaffold are scored 1-4.\n\nWrite a Glows/Grows/Goals progress report based on the following data.\n\nEVIDENCE ('+appr.length+' approved pieces):\n'+evSummary+'\n\nSCAFFOLD SCORES (averaged across evidence):\n'+scaffoldSummary+'\n\nLEARNING PLAN GOALS:\n'+lpSummary+'\n\nGlows = specific strengths with reference to evidence. Grows = meaningful growth this grading period. Goals = realistic next steps for the coming semester. Write in a warm, specific, asset-based tone as the student\'s advisor. Use '+stu.name+' by name throughout. Reference specific evidence titles and indicator names where it adds meaning. Do not use em dashes. Write 2-3 paragraphs per section. Return ONLY a valid JSON object with exactly three keys: glows, grows, goals. No markdown, no backticks, no other text.'+(reflections.q1||reflections.q2||reflections.q3?'\n\nADDITIONAL ADVISOR CONTEXT:\n'+(reflections.q1?'Notable outside evidence: '+reflections.q1+'\n':'')+(reflections.q2?'Student circumstances: '+reflections.q2+'\n':'')+(reflections.q3?'Emphasis or avoid: '+reflections.q3+'\n':''):'')+('\n\nCONFIRMED PROGRESSION LEVELS (advisor-reviewed):\n'+Object.keys(calcProgLevels).map(function(sid){return SC[sid].n+': Step '+calcProgLevels[sid];}).join(', '));
    try{
      var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      var data=await resp.json();
      var text=data.content.map(function(ci){return ci.text||'';}).join('');
      var parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      setGlows(parsed.glows||'');setGrows(parsed.grows||'');setGoals(parsed.goals||'');
      setRReady(true);setReportSaved(false);
    }catch(err){
      if(prewritten){setGlows(prewritten.glows);setGrows(prewritten.grows);setGoals(prewritten.goals);}
      else{setGlows(stu.name+' shows meaningful strengths across their learning this semester.');setGrows('Growth is evident in '+stu.name+' work this grading period.');setGoals('Suggested next steps for the coming semester include the following.');}
      setRReady(true);setReportSaved(false);
    }
    setRGenerating(false);
  }
